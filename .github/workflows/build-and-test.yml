name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build normalizer
        run: dotnet build src/Clevr.Acr.Normalizer/Clevr.Acr.Normalizer/Clevr.Acr.Normalizer.csproj --configuration Release

      - name: Run tests
        run: dotnet test src/Clevr.Acr.Normalizer/Clevr.Acr.Normalizer.Tests/Clevr.Acr.Normalizer.Tests.csproj --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.trx'

      - name: Build extension
        run: dotnet build src/Clevr.Acr.Extension/Clevr.Acr.Extension.csproj --configuration Release
